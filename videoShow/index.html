	<script src="https://unpkg.com/reveal.js/dist/reveal.js"></script>
		<script>
			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,

				// Learn about plugins: https://revealjs.com/plugins/
				/* plugins: [RevealMarkdown, RevealHighlight, RevealNotes], */
			});

            Reveal.on('slidechanged', event => {
  				const h = event.indexh + 1
				const v = event.indexv + 1
				document.getElementById("coords").textContent = `${h},${v}`
			})

            /**** BOTON PARA SALTAR ***/ 
            var element = document.getElementById("boton");
            
            element.addEventListener("click", function() {
                /* saltar a otra diapositiva */
                element.innerHTML="bb";
                Reveal.slide(2, 1);
                alert("salta");
        
            });


         // Función para pausar el video de fondo actual
            function pausaplayVideoFondo() {
            // 1. Obtenemos el contenedor de fondo de la slide actual
            const currentBackground = Reveal.getCurrentSlide().slideBackgroundElement;
            
            // 2. Buscamos el video dentro de ese fondo
            const video = currentBackground ? currentBackground.querySelector('video') : null;

            if (video) {
                if (video.paused) {
                video.play();
                console.log("▶️ Video en reproducción");
                } else {
                video.pause();
                console.log("⏸️ Video pausado");
                }
            } else {
                console.warn("No se encontró ningún video de fondo en esta diapositiva.");
            }
            }





		</script>
